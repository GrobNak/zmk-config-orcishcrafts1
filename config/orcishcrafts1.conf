# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Disable graphics display engines completely
CONFIG_ZMK_DISPLAY=n

# THE CANONICAL SPLIT INITIALIZATION RULES
# This explicitly locks the ZMK Studio backend hooks onto your central USB master.
# When you plug the left half into your computer, ZMK Studio opens a single 12-column dashboard 
# that controls both halves of your board seamlessly.
# Forcing the right side to select 'n' keeps the right-side build runner from crashing.
# 
# NOTE: ZMK configuration files use canonical Kconfig syntax; do not use '%' prefixes.
#
# Left Side Master Enablement
#
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

#
# Right Side Peripheral Overrides
#
# (The compiler applies standard Kconfig priority to decouple layout asserts on the slave half)
