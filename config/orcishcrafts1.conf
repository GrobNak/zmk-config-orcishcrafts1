# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Force Core Hardware SPI Peripheral Engines Active
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y
CONFIG_SPI_NRFX=y
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Automated ZMK Display Handlers
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# CORE DISPLAY UNLOCK FLAGS: Forces graphics data out even if battery telemetry is empty
CONFIG_ZMK_DISPLAY_DUMMY=y

# Core Keyboard Options (Your exact working layout pins)
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Production-Grade LVGL Graphics Settings (1-Bit Monochrome Canvas)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y             
CONFIG_LV_MEM_CUSTOM=y
CONFIG_LV_Z_MEM_POOL_SIZE=4096        
CONFIG_LV_Z_VDB_SIZE=10

# Keep text console logging active over USB
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_DEFERRED=y
