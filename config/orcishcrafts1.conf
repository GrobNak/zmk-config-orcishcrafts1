# Core Matrix Hooks
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_EXT_POWER=y

# FORCE ZEPHYR KERNEL PERIPHERAL ENGINES ON
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_SPI_3=y

# Enable the raw low-level display driver pipelines
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_MIPI_DBI=y

# Completely isolate the hardware from high-level ZMK display queues
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
