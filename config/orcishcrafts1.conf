# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Options
CONFIG_KSCAN=y
CONFIG_GPIO=y

# Turn on the hardware power switch lines
CONFIG_ZMK_EXT_POWER=y

# ACTIVATE THE NATIVE AUTOMATED ZMK DISPLAY WINDOW QUEUES
# This lets the framework handle the SPI clocks and memory setups safely
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_ZMK_DISPLAY=y

# Enable the built-in monochrome widget framework as a baseline test pattern
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n

# Standard memory allocations for display rendering
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_VDB_SIZE=10
