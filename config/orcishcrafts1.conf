# Core Matrix & Hardware Driver Settings
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_STUDIO=y

# Force internal microcontroller power lines active on boot
CONFIG_ZMK_EXT_POWER=y

# Enable the physical display hardware drivers inside Zephyr
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Completely disable the inactive ZMK UI thread loops to stop memory freezes
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
