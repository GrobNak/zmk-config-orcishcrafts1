# Force low-level Nordic chip compilation to release NFC pins
CONFIG_NFCT_PINS_AS_GPIOS=y
# Enable ZMK Studio integration
CONFIG_ZMK_STUDIO=y
CONFIG_USB_DEVICE_STACK=y
# Disable ZMK Studio security locking
CONFIG_ZMK_STUDIO_LOCKING=n

# Core Display Driver Settings
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Enable ZMK Display Engine with custom UI flag
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Forces Zephyr to drive display GPIO controls
CONFIG_GPIO=y

# Graphics Allocation Parameters (RGB565)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_MEM_CUSTOM=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_VDB_SIZE=10

# Forces the matrix transformation engine to register the custom screen boundary
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
