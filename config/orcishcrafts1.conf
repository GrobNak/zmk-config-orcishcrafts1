# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM ENABLERS
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# FORCE MONOCHROME DATA INTERPRETATION
# Forces ZMK to treat the color canvas buffer as single-channel pixels
CONFIG_ZMK_DISPLAY_MONO_COLOR_INVERT=y
