# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP (5-Minute Inactivity Timeout)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM ENABLERS
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# THE UNIFIED DISPLAY STREAM CORRECTION
# Keeps the display task separated on its own thread, and removes the 
# high-verbose log dumps that are overflowing the internal memory queues.
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
