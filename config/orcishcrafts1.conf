# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP (Fully Supported on Zephyr 3.5.0)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# BYPASS DEFAULT SCREEN COLLISION
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# THE UNIFIED LVGL FEATURE ENABLERS
# Corrected exactly to use ZMK's native internal Kconfig wrapper prefixes
# to force the text layout engines into the compiled firmware binary.
CONFIG_LV_Z_USE_LABEL=y
CONFIG_LV_Z_USE_OBJ=y
