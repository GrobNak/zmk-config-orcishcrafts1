# --- POWER MANAGEMENT CONFIGURATION ---
# 1. Enable Core Power Management Framework
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y

# 2. Deep Sleep Timer Setup (In milliseconds)
# 900000 ms = 15 Minutes of complete inactivity before deep sleep shutdown
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# 3. Automated Display Power Controls
# Instantly blanks the display panel when the keyboard goes idle to protect battery life
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# 4. Core Keyboard Options (Your exact working layout pins)
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Production-Grade LVGL Graphics Settings (1-Bit Monochrome Canvas)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y             
CONFIG_LV_MEM_CUSTOM=y
CONFIG_LV_Z_MEM_POOL_SIZE=4048        
CONFIG_LV_Z_VDB_SIZE=10

# Keep text console logging active over USB
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_DEFERRED=y
