# Force internal oscillator clock stabilization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# HARDWARE DELAY FIX: Force the kernel to wait for clock lock before launching data buses
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-1
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096

# Native Zephyr USB Core Console Activations
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="ZMK Debug Console"
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Core Keyboard Subsystem Basics
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y
CONFIG_ZMK_EXT_POWER=y

# Lower-level physical display driver configurations
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Completely isolate the hardware from threaded wrappers to bypass memory deadlocks
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
