# FORCE THE KERNEL TO USE AN INTERNAL CLOCK SYSTEM (REQUIRED FOR SUPERMINI CLONES)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# HARDWARE OVERRIDE FIX: Forces high-speed SPI channels to run on the internal HF clock
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF=y

# FORCE CORE PORT 1 PERIPHERALS ACTIVE (REQUIRED FOR 113/115 CHANNELS)
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# Core Keyboard Matrix Configuration
CONFIG_KSCAN=y
CONFIG_ZMK_EXT_POWER=y

# Core Display Subsystem Settings
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Low-Level LVGL Graphics Settings (16-bit RGB565 Color)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_MEM_CUSTOM=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_VDB_SIZE=10

# Force Raw USB Serial Console Logging On
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
