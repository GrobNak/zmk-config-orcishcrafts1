# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Disable graphics display engines completely to allow custom drawing
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# NATIVE AUTOMATIC DEEP SLEEP (Fully Supported on Zephyr 3.5.0)
CONFIG_ZMK_SLEEP=y

# Time before deep sleep kicks in, defined in milliseconds.
# 300,000 ms = exactly 5 minutes of absolute inactivity.
CONFIG_ZMK_IDLE_TIMEOUT=300000
