# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# FORCE THE KERNEL TO ACTIVELY RUN IN HIGH-PRIORITY LOGGING OVERRIDE MODE
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n

# Native Zephyr USB Core Console Activations (Bypasses ZMK thread locks)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="ZMK Debug Console"
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Core Keyboard Subsystem Basics
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y
CONFIG_ZMK_EXT_POWER=y

# Lower-level physical display driver configurations
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Turn off ZMK's layout wrappers entirely to keep the memory footprint clear
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
