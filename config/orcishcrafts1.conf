# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# DISABLE ZMK STUDIO FOR RAW CONSOLE PASS-THROUGH
CONFIG_ZMK_STUDIO=n

# ACTIVATE NATIVE CORE LOGGING PIPELINES
# This instructs ZMK to handle the USB serial port safely without collisions
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_MINIMAL=n

# Core Keyboard Options (Your exact working layout pins)
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Production Native ZMK Display Stack Loops
CONFIG_DISPLAY=y
CONFIG_ST7789V=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Low-Level LVGL Graphics Settings (16-bit RGB565 Color)
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_MEM_CUSTOM=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_VDB_SIZE=10
