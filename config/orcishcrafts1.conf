# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# FORCE CORE PORT 1 PERIPHERALS ACTIVE (REQUIRED FOR 113/115 CHANNELS)
CONFIG_GPIO=y
CONFIG_GPIO_NRFX=y

# NATIVE ZEPHYR HIGH-PRIORITY IMMEDIATE SERIAL ENGINE HOOKS
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# HARDWARE COMPOSITE FIX: Forces the USB stack to explicitly spawn the CDC ACM serial port lane
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_COMPOSITE_DEVICE=y
CONFIG_USB_CDC_ACM_LOG_LEVEL_DBG=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Core Keyboard Subsystem Basics
CONFIG_KSCAN=y
CONFIG_ZMK_EXT_POWER=y

# Lower-level physical display driver configurations
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

# Completely isolate the hardware from threaded wrappers to bypass memory deadlocks
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
