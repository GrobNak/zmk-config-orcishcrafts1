# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP (Fully Supported on Zephyr 3.5.0)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# BYPASS DEFAULT SCREEN COLLISION
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# THE UNIFIED LVGL CORE ENABLERS
# These force the compiler to keep text labels and basic object engines 
# inside the compiled firmware instead of slicing them out during optimization.
CONFIG_LV_Z_ENABLE_SUB_WIDGETS=y
CONFIG_LV_OBJ_CONTAINER=y
CONFIG_LV_LABEL=y
