# User Configuration for ${keyboard.name}

# 1. Unlock NFC Pins (P0.09 and P0.10) for matrix use
CONFIG_NFCT_PINS_AS_GPIOS=y

# 2. Free up the power/LED pin (P1.00) from system routines
CONFIG_ZMK_RECONFIG_LO_FREQ_CLK=y

# 3. Optimize power routing to stabilize the P1.xx cluster
CONFIG_BOARD_ENABLE_DCDC=y
