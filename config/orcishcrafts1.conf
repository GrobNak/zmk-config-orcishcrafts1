# Enable display subsystem
CONFIG_ZMK_DISPLAY=y
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH=16

# Debug logging for troubleshooting
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_DEFAULT_LEVEL=4

# SPI configuration
CONFIG_SPI_NORDIC_SOFTDEV=y

# Wireless split optimizations
CONFIG_SPLIT_KEYBOARD=y
CONFIG_SETTINGS_KEYS_IN_FLASH_SIZE=512

# Power management (critical for battery life!)
CONFIG_PM=y
CONFIG_SYS_POWER_STATE_USER_OFF_TIMEOUT_MS=1000

# Increase stack size for graphics operations
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_MAIN_THREAD_STACK_SIZE=4096

# Reduce CPU load for BLE stability
CONFIG_BT_ACL_CONNECTIONS=1
CONFIG_BT_MAX_PAIRED=1
