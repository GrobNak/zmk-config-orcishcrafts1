# Force low-level Nordic chip compilation to release NFC pins
CONFIG_NFCT_PINS_AS_GPIOS=y
# Enable ZMK Studio integration
CONFIG_ZMK_STUDIO=y
CONFIG_USB_DEVICE_STACK=y
# Disable ZMK Studio security locking
CONFIG_ZMK_STUDIO_LOCKING=n

# Core Display Support
CONFIG_ZMK_DISPLAY=y
CONFIG_ST7789V=y

# 1. Force the graphics architecture to 16-bit color (RGB565) depth
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y

# 2. Disable ZMK's built-in monochrome widget screen
# This stops the compiler from trying to draw black-and-white text on your color screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# 3. Enable raw LVGL graphics rendering so the screen can receive standard code instructions
CONFIG_LVGL=y
