# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP (Fully Supported on Zephyr 3.5.0)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM ENABLERS
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# NATIVE USB LOGGING PARAMETERS
# Turns on the core logging engine and directs console output straight to the USB VCOM port
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# VERBOSE DISPLAY ENGINE DIAGNOSTICS
# Forces the Sitronix driver and graphics layer to print explicit errors to the log
CONFIG_DISPLAY_LOG_LEVEL_DBG=y
CONFIG_SPI_LOG_LEVEL_DBG=y
