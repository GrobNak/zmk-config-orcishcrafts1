# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# Disable graphics display engines completely
CONFIG_ZMK_DISPLAY=n

# THE COMPLETE POWER MANAGEMENT SUITE
# Turn on sleep tracking engines
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Activate the Soft Off framework
CONFIG_ZMK_PM_SOFT_OFF=y

# THE WAKE-UP INTERRUPT ENABLER
# This forces the microcontroller to keep the matrix row interrupt lines 
# energized during deep sleep, allowing any top-row key tap to wake the chips.
CONFIG_ZMK_KSCAN_MATRIX_WAKEUP_SOURCE=y
