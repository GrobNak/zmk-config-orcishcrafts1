# Force internal oscillator clock synchronization for SuperMini clone boards
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# Core Keyboard Electronic Options
CONFIG_KSCAN=y
CONFIG_GPIO=y
CONFIG_ZMK_EXT_POWER=y

# NATIVE AUTOMATIC DEEP SLEEP (Fully Supported on Zephyr 3.5.0)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# THE CORE DISPLAY SUBSYSTEM
CONFIG_ZMK_DISPLAY=y
CONFIG_SPI=y

# BYPASS DEFAULT SCREEN COLLISION
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# THE CORRECT GRAPHICS ENGINE WIDGET UNLOCK
# This forces the build system to link the underlying text rendering libraries 
# so 'lv_label_create' and 'lv_label_set_text' exist at the link stage.
CONFIG_LV_USE_LABEL=y
